name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - master

permissions:
  contents: read
  id-token: write  # required for Workload Identity Federation

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Authenticate to GCP using Workload Identity Federation (no JSON key needed)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/498098249143/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@pricewatch-app-497315.iam.gserviceaccount.com

      # 3. Set up gcloud CLI
      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # 4. Allow Docker to push to Artifact Registry
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # 5. Build the Docker image
      - name: Build Docker image
        run: docker build -t us-central1-docker.pkg.dev/pricewatch-app-497315/pricewatch/app:latest .

      # 6. Push the image to Artifact Registry
      - name: Push Docker image
        run: docker push us-central1-docker.pkg.dev/pricewatch-app-497315/pricewatch/app:latest

      # 7. Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy pricewatch \
            --image=us-central1-docker.pkg.dev/pricewatch-app-497315/pricewatch/app:latest \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --memory=1Gi \
            --port=3000 \
            --project=pricewatch-app-497315

      # 8. Print the live URL
      - name: Print live URL
        run: gcloud run services describe pricewatch --region=us-central1 --format="value(status.url)" --project=pricewatch-app-497315
